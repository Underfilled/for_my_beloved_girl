<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" />

  <!-- Circular arrows (recycling/rotation symbol) -->
  <!-- Arrow 1 - top -->
  <path d="M 256 110
           A 130 130 0 0 1 369 208"
        fill="none" stroke="white" stroke-width="30" stroke-linecap="round"/>
  <polygon points="379,188 398,228 358,220" fill="white"/>

  <!-- Arrow 2 - bottom-right -->
  <path d="M 369 310
           A 130 130 0 0 1 200 380"
        fill="none" stroke="white" stroke-width="30" stroke-linecap="round"/>
  <polygon points="215,395 175,378 195,342" fill="white"/>

  <!-- Arrow 3 - bottom-left -->
  <path d="M 155 210
           A 130 130 0 0 1 256 110"
        fill="none" stroke="white" stroke-width="30" stroke-linecap="round"/>
  <polygon points="140,225 125,183 166,190" fill="white"/>

  <!-- Center play circle (video note) -->
  <circle cx="256" cy="256" r="60" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="5"/>

  <!-- Play triangle -->
  <polygon points="240,225 240,287 285,256" fill="white"/>
</svg>
