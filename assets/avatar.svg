<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3483;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A569BD;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2D1B69;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" />
  <circle cx="256" cy="256" r="180" fill="url(#glow)" />

  <!-- Face outline -->
  <ellipse cx="256" cy="265" rx="95" ry="115" fill="#F0D5BE" opacity="0.9"/>

  <!-- Eyes -->
  <ellipse cx="218" cy="235" rx="13" ry="7" fill="#2D1B69"/>
  <ellipse cx="294" cy="235" rx="13" ry="7" fill="#2D1B69"/>

  <!-- Finger (vertical over lips) -->
  <rect x="247" y="260" width="18" height="85" rx="9" fill="#F0D5BE" stroke="#E0C5AE" stroke-width="2"/>

  <!-- Lips behind finger -->
  <ellipse cx="256" cy="300" rx="26" ry="9" fill="#E88B8B" opacity="0.7"/>

  <!-- Sound waves -->
  <path d="M 145 220 Q 122 256 145 292" fill="none" stroke="#A569BD" stroke-width="4" opacity="0.6"/>
  <path d="M 125 200 Q 92 256 125 312" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.35"/>

  <path d="M 367 220 Q 390 256 367 292" fill="none" stroke="#A569BD" stroke-width="4" opacity="0.6"/>
  <path d="M 387 200 Q 420 256 387 312" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.35"/>
</svg>
