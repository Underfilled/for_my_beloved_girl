<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3483;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A569BD;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2D1B69;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" />
  <circle cx="256" cy="256" r="180" fill="url(#glow)" />

  <!-- Finger over lips (shh gesture) - simplified -->
  <!-- Face outline -->
  <ellipse cx="256" cy="280" rx="90" ry="110" fill="#F0D5BE" opacity="0.9"/>

  <!-- Eyes -->
  <ellipse cx="220" cy="250" rx="12" ry="6" fill="#2D1B69"/>
  <ellipse cx="292" cy="250" rx="12" ry="6" fill="#2D1B69"/>

  <!-- Finger (vertical over lips) -->
  <rect x="247" y="270" width="18" height="80" rx="9" fill="#F0D5BE" stroke="#E0C5AE" stroke-width="2"/>

  <!-- Lips behind finger -->
  <ellipse cx="256" cy="310" rx="25" ry="8" fill="#E88B8B" opacity="0.7"/>

  <!-- Sound waves (whisper) -->
  <path d="M 150 230 Q 130 256 150 282" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.6"/>
  <path d="M 135 215 Q 108 256 135 297" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.4"/>
  <path d="M 120 200 Q 86 256 120 312" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.2"/>

  <path d="M 362 230 Q 382 256 362 282" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.6"/>
  <path d="M 377 215 Q 404 256 377 297" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.4"/>
  <path d="M 392 200 Q 426 256 392 312" fill="none" stroke="#A569BD" stroke-width="3" opacity="0.2"/>

  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white" letter-spacing="4" opacity="0.95">
    ШЁПОТ
  </text>
</svg>
